.test-jobs-common:
  stage: test
  image: registry.gitlab.com/xen-project/xen/${CONTAINER}

.x86-64-test-needs: &x86-64-test-needs
  - alpine-3.18-rootfs-export
  - kernel-6.1.19-export

.qemu-x86-64:
  extends: .test-jobs-common
  variables:
    CONTAINER: debian:bookworm
    LOGFILE: qemu-smoke-x86-64.log
  artifacts:
    paths:
      - smoke.serial
      - '*.log'
    when: always
  tags:
    - x86_64

.qemu-smoke-x86-64:
  extends: .qemu-x86-64
  variables:
    TEST_TIMEOUT_OVERRIDE: 120

.xilinx-x86_64:
  extends: .test-jobs-common
  variables:
    CONTAINER: ubuntu:xenial-xilinx
    LOGFILE: xilinx-smoke-x86_64.log
    XEN_CMD_CONSOLE: "console=com2 com2=57600,8n1,0x2F8,4"
    TEST_BOARD: "crater"
    TEST_TIMEOUT_OVERRIDE: 1000
  artifacts:
    paths:
      - smoke.serial
      - '*.log'
    when: always
  only:
    variables:
      - $XILINX_JOBS == "true"
  tags:
    - xilinx

.adl-x86-64:
  extends: .test-jobs-common
  variables:
    # the test controller runs on RPi4
    CONTAINER: alpine:3.18-arm64v8
    LOGFILE: smoke-test.log
    PCIDEV: "03:00.0"
    PCIDEV_INTR: "MSI-X"
    CONSOLE_OPTS: "console=com1 com1=115200,8n1"
  artifacts:
    paths:
      - smoke.serial
      - '*.log'
    when: always
  only:
    variables:
      - $QUBES_JOBS == "true"
  tags:
    - qubes-hw2

.zen3p-x86-64:
  # it's really similar to the above
  extends: .adl-x86-64
  variables:
    PCIDEV: "01:00.0"
    PCIDEV_INTR: "MSI-X"
    CONSOLE_OPTS: "console=com1 com1=115200,8n1,pci,msi"
  tags:
    - qubes-hw11

# Test jobs
build-each-commit-gcc:
  extends: .test-jobs-common
  variables:
    CONTAINER: debian:bookworm
    XEN_TARGET_ARCH: x86_64
    CC: gcc
  script:
    - BASE=${BASE_SHA:-${CI_COMMIT_BEFORE_SHA}} TIP=${TIP_SHA:-${CI_COMMIT_SHA}} ./automation/gitlab-ci/build-each-commit.sh 2>&1 | tee build-each-commit-gcc.log
  artifacts:
    paths:
      - '*.log'
    when: always
  needs: []
  tags:
    - x86_64

xilinx-smoke-dom0-x86_64-gcc-debug:
